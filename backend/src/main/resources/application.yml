spring:
  application:
    name: smart-elderly-care-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    serialization:
      # Map / ApiResponse.data 中 java.time.Instant 一律为 ISO-8601（如 ...Z），避免时间戳被客户端当毫秒误读
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# 自定义：与 @ConfigurationProperties(prefix = "app") 绑定
app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  # 与签发登录 JWT 的一方保持一致（HS256，密钥长度建议 ≥ 32 字符）
  jwt:
    secret: ${APP_JWT_SECRET:dev-sos-jwt-secret-key-at-least-32-chars!!}

---
spring:
  config:
    activate:
      on-profile: dev
  # 本地 MySQL：库名 elder（与 Navicat 一致）
  datasource:
    url: jdbc:mysql://localhost:3306/elder?useUnicode=true&characterEncoding=utf8&connectionTimeZone=Asia/Shanghai&serverTimezone=Asia/Shanghai
    username: root
    password: "Gkm104021"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai

logging:
  level:
    root: INFO
    com.smartelderly: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

---
spring:
  config:
    activate:
      on-profile: prod
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  forward-headers-strategy: framework
  shutdown: graceful

logging:
  level:
    root: WARN
    com.smartelderly: INFO

app:
  cors:
    allowed-origins:
      - https://your-frontend.example.com

# 生产环境关闭 Swagger，避免接口文档对外暴露
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
