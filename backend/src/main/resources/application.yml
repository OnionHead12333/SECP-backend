spring:
  application:
    name: smart-elderly-care-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# 自定义：与 @ConfigurationProperties(prefix = "app") 绑定
app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: INFO
    com.smartelderly: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  forward-headers-strategy: framework
  shutdown: graceful

logging:
  level:
    root: WARN
    com.smartelderly: INFO

app:
  cors:
    allowed-origins:
      - https://your-frontend.example.com
