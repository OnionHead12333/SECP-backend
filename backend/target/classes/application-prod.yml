# 生产：java -jar app.jar --spring.profiles.active=prod
# 建议在部署环境设置 SERVER_PORT、SPRING_PROFILES_ACTIVE，并按域名配置 CORS

server:
  forward-headers-strategy: framework
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

logging:
  level:
    root: WARN
    com.smartelderly: INFO

# 部署前请改为真实前端地址（可配置多条）
app:
  cors:
    allowed-origins:
      - https://your-frontend.example.com
